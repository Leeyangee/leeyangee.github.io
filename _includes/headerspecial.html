<header>
  <div style="margin-top:30vh;margin-bottom:15vh">
    <a style="text-decoration: none;" href="{{ "/" | prepend: site.baseurl | replace: '//', '/' }}">
      <h1 id="showtag">
        Hello,World!
      </h1>
    </a>
    <script>
            async function rollingWords(){
                var TIME = 60;
                var listMax = 0;
                
                showAdd = "Hello,World!";
                for(var i = 0;i <= showAdd.length; i ++){
                    document.getElementById("showtag").innerHTML = showAdd.substr(0,i);
                    await sleep(TIME);
                }
                await sleep(2000);
                for(var i = showAdd.length; i >= 1; i --){
                    document.getElementById("showtag").innerHTML = showAdd.substr(0,i);
                    await sleep(TIME);
                }
                document.getElementById("showtag").innerHTML = "&nbsp;";
              
            }
            
            function getRequest(){
                rollingWords();
            }
            
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            
            function check(){
                try{
                    getRequest();
                }catch(error){ }
            }
            
            check()
    </script>
    <a style="text-decoration: none;" href="{{ "/" | prepend: site.baseurl | replace: '//', '/' }}">
    {% assign owner_first_name = site.owner | split: " " %}
    <h1>{{ owner_first_name[0] | downcase }}@home:~$</h1>
    </a>
    <div class="header-links">
      {% include links.html %}
    </div>
  </div>
</header>
